<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>README — Akasha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #1a1a1a;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.75;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    /* ── Top bar ──────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 32px;
      border-bottom: 1px solid #e8e8e8;
      margin-bottom: 48px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: #c9a050; }
    .back-link svg { flex-shrink: 0; }

    .topbar-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c9a050;
    }

    /* ── Content ─────────────────────────────────────────────────── */
    #readme-content { color: #1a1a1a; }

    #readme-content h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: #111;
      margin: 0 0 8px;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }
    #readme-content h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: #111;
      margin: 48px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e8e8;
    }
    #readme-content h3 {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c9a050;
      margin: 32px 0 10px;
    }
    #readme-content p {
      margin: 0 0 16px;
      color: #333;
    }
    #readme-content strong { color: #111; font-weight: 600; }
    #readme-content em { font-style: italic; }
    #readme-content code {
      font-family: 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
      font-size: 0.82rem;
      background: #f4f4f4;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1px 6px;
      color: #c7254e;
    }
    #readme-content pre {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 18px 22px;
      overflow-x: auto;
      margin: 0 0 20px;
    }
    #readme-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: #333;
      font-size: 0.84rem;
    }
    #readme-content ul, #readme-content ol {
      padding-left: 24px;
      margin: 0 0 16px;
    }
    #readme-content li {
      color: #333;
      margin-bottom: 5px;
    }
    #readme-content blockquote {
      border-left: 3px solid #c9a050;
      padding: 6px 0 6px 20px;
      margin: 20px 0;
      color: #555;
      font-style: italic;
    }
    #readme-content hr {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 36px 0;
    }
    #readme-content a { color: #c9a050; text-decoration: none; }
    #readme-content a:hover { text-decoration: underline; }
    #readme-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 20px;
      font-size: 0.88rem;
    }
    #readme-content th, #readme-content td {
      border: 1px solid #e0e0e0;
      padding: 8px 12px;
      text-align: left;
    }
    #readme-content th { background: #f8f8f8; font-weight: 600; color: #111; }

    .loading { color: #aaa; font-size: 0.9rem; font-style: italic; }
    .error   { color: #c00; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="page">

  <div class="topbar">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <span class="topbar-logo">Akasha</span>
  </div>

  <div id="readme-content">
    <p class="loading">Loading…</p>
  </div>

</div>

<script>
  function renderMd(md) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    function inline(s) {
      return esc(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,     '<em>$1</em>')
        .replace(/`([^`]+)`/g,     '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                 '<a href="$2" target="_blank" rel="noopener">$1</a>');
    }
    const lines = md.split('\n');
    let out = '', inPre = false, inUl = false, inOl = false, inTable = false;
    function closeList() {
      if (inUl) { out += '</ul>\n'; inUl = false; }
      if (inOl) { out += '</ol>\n'; inOl = false; }
    }
    function closeTable() {
      if (inTable) { out += '</tbody></table>\n'; inTable = false; }
    }
    for (const raw of lines) {
      const line = raw.trimEnd();
      if (line.startsWith('```')) {
        if (!inPre) { closeList(); closeTable(); out += '<pre><code>'; inPre = true; }
        else        { out += '</code></pre>\n'; inPre = false; }
        continue;
      }
      if (inPre) { out += esc(raw) + '\n'; continue; }
      if (/^\|/.test(line)) {
        if (/^\|[-:| ]+\|/.test(line)) continue; // separator row
        if (!inTable) {
          closeList(); out += '<table><thead>'; inTable = true;
          const cols = line.split('|').slice(1,-1).map(c => `<th>${inline(c.trim())}</th>`).join('');
          out += `<tr>${cols}</tr></thead><tbody>\n`; continue;
        }
        const cols = line.split('|').slice(1,-1).map(c => `<td>${inline(c.trim())}</td>`).join('');
        out += `<tr>${cols}</tr>\n`; continue;
      }
      closeTable();
      if (/^---+$/.test(line)) { closeList(); out += '<hr>\n'; continue; }
      const h1 = line.match(/^# (.+)/);
      const h2 = line.match(/^## (.+)/);
      const h3 = line.match(/^### (.+)/);
      if (h1) { closeList(); out += `<h1>${inline(h1[1])}</h1>\n`; continue; }
      if (h2) { closeList(); out += `<h2>${inline(h2[1])}</h2>\n`; continue; }
      if (h3) { closeList(); out += `<h3>${inline(h3[1])}</h3>\n`; continue; }
      const bq = line.match(/^> (.+)/);
      if (bq) { closeList(); out += `<blockquote><p>${inline(bq[1])}</p></blockquote>\n`; continue; }
      const ul = line.match(/^[-*] (.+)/);
      if (ul) {
        if (inOl) { out += '</ol>\n'; inOl = false; }
        if (!inUl) { out += '<ul>\n'; inUl = true; }
        out += `<li>${inline(ul[1])}</li>\n`; continue;
      }
      const ol = line.match(/^\d+\. (.+)/);
      if (ol) {
        if (inUl) { out += '</ul>\n'; inUl = false; }
        if (!inOl) { out += '<ol>\n'; inOl = true; }
        out += `<li>${inline(ol[1])}</li>\n`; continue;
      }
      if (!line.trim()) { closeList(); out += '\n'; continue; }
      closeList();
      out += `<p>${inline(line)}</p>\n`;
    }
    closeList(); closeTable();
    return out;
  }

  (async function () {
    const el = document.getElementById('readme-content');
    try {
      const r = await fetch('/api/readme');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      el.innerHTML = renderMd(await r.text());
    } catch (e) {
      el.innerHTML = `<p class="error">Could not load README: ${e.message}</p>`;
    }
  })();
</script>
</body>
</html>
